<!DOCTYPE html>
<html>
<head><title>05 color grid</title></head>
<body style="background:#0a0e1a;margin:0;padding:20px">
<div style="color:#ffffff;font-size:16px;margin-bottom:10px">NexVigilant Brand Colors</div>
<div style="display:flex;margin-bottom:5px">
  <div style="width:60px;height:60px;background:#00ccff;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#00cc66;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#ffcc00;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#ff4444;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#cc66ff;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#ffffff"></div>
</div>
<div style="display:flex;margin-bottom:5px">
  <div style="width:60px;height:60px;background:#0a0e1a;border:1px solid #333;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#111111;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#222222;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#333333;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#666666;margin-right:5px"></div>
  <div style="width:60px;height:60px;background:#999999"></div>
</div>
<div style="color:#666;font-size:12px;margin-top:10px">Row 1: accent colors | Row 2: grays</div>
</body>
</html>
