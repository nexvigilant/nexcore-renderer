<!DOCTYPE html>
<html>
<head><title>03 nested layout</title></head>
<body style="background:#0a0e1a;margin:0;padding:20px">
<div style="background:#111;padding:15px;margin-bottom:10px">
  <div style="color:#00ccff;font-size:16px;margin-bottom:5px">Outer container</div>
  <div style="background:#222;padding:10px;margin-bottom:5px">
    <div style="color:#00cc66;font-size:14px">Nested level 1</div>
    <div style="background:#333;padding:8px;margin-top:5px">
      <div style="color:#ffcc00;font-size:12px">Nested level 2</div>
    </div>
  </div>
  <div style="background:#222;padding:10px">
    <div style="color:#ff4444;font-size:14px">Sibling container</div>
  </div>
</div>
</body>
</html>
