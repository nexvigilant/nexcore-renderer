<!DOCTYPE html>
<html>
<head><title>07 borders and text</title></head>
<body style="background:#0a0e1a;margin:0;padding:20px">
<div style="color:#ffffff;font-size:16px;margin-bottom:10px">Borders and Text Styling</div>

<!-- Border shorthand -->
<div style="border:2px solid #00ccff;padding:10px;color:#ffffff;margin-bottom:10px">
  Cyan border box with padding
</div>

<!-- Border on specific sides -->
<div style="border-left:4px solid #ff4444;padding:8px;color:#cccccc;margin-bottom:10px">
  Left border only (blockquote style)
</div>

<!-- Text alignment -->
<div style="background:#111;padding:10px;margin-bottom:10px">
  <div style="color:#00ccff;text-align:left">Left aligned text</div>
  <div style="color:#00cc66;text-align:center">Center aligned text</div>
  <div style="color:#ffcc00;text-align:right">Right aligned text</div>
</div>

<!-- Text decoration -->
<div style="margin-bottom:10px">
  <span style="color:#00ccff;text-decoration:underline">Underlined text</span>
</div>
<div style="margin-bottom:10px">
  <span style="color:#ff4444;text-decoration:line-through">Strikethrough text</span>
</div>

<!-- Opacity -->
<div style="display:flex;gap:10px">
  <div style="width:80px;height:40px;background:#00ccff;opacity:1.0"></div>
  <div style="width:80px;height:40px;background:#00ccff;opacity:0.7"></div>
  <div style="width:80px;height:40px;background:#00ccff;opacity:0.4"></div>
  <div style="width:80px;height:40px;background:#00ccff;opacity:0.1"></div>
</div>
</body>
</html>
