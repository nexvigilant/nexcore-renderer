<!DOCTYPE html>
<html>
<head><title>06 flex layout</title></head>
<body style="background:#0a0e1a;margin:0;padding:20px">
<div style="color:#ffffff;font-size:16px;margin-bottom:10px">Flex Layout Tests</div>

<!-- Row with justify-content: space-between -->
<div style="display:flex;justify-content:space-between;margin-bottom:10px">
  <div style="width:80px;height:40px;background:#00ccff"></div>
  <div style="width:80px;height:40px;background:#00cc66"></div>
  <div style="width:80px;height:40px;background:#ffcc00"></div>
</div>

<!-- Row with justify-content: center -->
<div style="display:flex;justify-content:center;gap:10px;margin-bottom:10px">
  <div style="width:60px;height:40px;background:#ff4444"></div>
  <div style="width:60px;height:40px;background:#cc66ff"></div>
  <div style="width:60px;height:40px;background:#ffffff"></div>
</div>

<!-- Column direction -->
<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:10px">
  <div style="height:30px;background:#00ccff"></div>
  <div style="height:30px;background:#00cc66"></div>
  <div style="height:30px;background:#ffcc00"></div>
</div>

<!-- Flex grow -->
<div style="display:flex;gap:5px">
  <div style="flex:1;height:40px;background:#00ccff"></div>
  <div style="flex:2;height:40px;background:#ff4444"></div>
  <div style="flex:1;height:40px;background:#00cc66"></div>
</div>
</body>
</html>
